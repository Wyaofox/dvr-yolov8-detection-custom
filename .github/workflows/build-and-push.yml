name: Build and Push YOLO Detection Framework Docker Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: flyingfathead/dvr-yolov8-detection
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BUILDKIT_PROGRESS: plain

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Free disk space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "$AGENT_TOOLSDIRECTORY" || true
          docker system prune -af || true
          df -h

      - name: Log in to GHCR
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          pull: true
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=dvr-yolov8-detection
          cache-to: type=gha,mode=max,scope=dvr-yolov8-detection
          provenance: false
          sbom: false
          build-args: |
            CUDA_VERSION=12.4.0
            UBUNTU_VERSION=22.04
            OPENCV_VERSION=4.10.0
            CUDA_ARCH_BIN=61;70;75;80;86;89

      - name: Check disk usage
        if: always()
        run: df -h

