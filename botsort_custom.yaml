# Custom BoT-SORT config with ReID enabled
# Based on: https://github.com/NirAharon/BoT-SORT

tracker_type: botsort
track_high_thresh: 0.3
track_low_thresh: 0.1
new_track_thresh: 0.3
track_buffer: 90       # Keep lost tracks for 90 frames (~3 sec at 30fps), handles occlusion better
match_thresh: 0.7
fuse_score: True

# Global motion compensation
gmc_method: sparseOptFlow

# ReID settings - use built-in detector features for appearance matching
proximity_thresh: 0.5
appearance_thresh: 0.3  # Lower threshold = easier to match same person across gaps
with_reid: True         # Enable ReID for identity persistence
model: auto             # Use detector features for ReID (YOLO backbone features)
